<!-- Service Worker -->
<script>

let newWorker;

if ('serviceWorker' in navigator) {

window.addEventListener('load', () => {

navigator.serviceWorker.register('sw.js')
.then(reg => {

console.log('Service Worker registrado', reg);

/* detectar actualización */

reg.addEventListener('updatefound', () => {

newWorker = reg.installing;

newWorker.addEventListener('statechange', () => {

if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {

document.getElementById("updateBox").style.display="block";

}

});

});

})
.catch(err => console.log('Error SW', err));

});

}

/* botón actualizar */

function actualizarApp(){

if(newWorker){

newWorker.postMessage({action:'skipWaiting'});

}

window.location.reload();

}

</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore,collection,addDoc,onSnapshot,updateDoc,doc,Timestamp,deleteDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyC1HkK67NNJuDsN5xQuQOVPtgj-H1u9ZdA",
authDomain:"taqueria-pedidos.firebaseapp.com",
projectId:"taqueria-pedidos"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const pedidosRef=collection(db,"pedidos");

let pedidoTemp = {};
let pedidos=[];
let vistaActual="pendiente";
let abiertos = new Set();
  
let graficaVentas,graficaOrdenes,graficaTipos;
function formatearFechaConDia(fechaStr){

let partes;

if(fechaStr.includes("-")){
// formato 2026-03-20
partes = fechaStr.split("-");
return formatear(new Date(partes[0], partes[1]-1, partes[2]));
}

if(fechaStr.includes("/")){
// formato 20/03/2026
partes = fechaStr.split("/");
return formatear(new Date(partes[2], partes[1]-1, partes[0]));
}

return fechaStr;

function formatear(fecha){
let dias = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
let dia = dias[fecha.getDay()];
let fechaTexto = fecha.toLocaleDateString("es-MX");
return `${dia} [${fechaTexto}]`;
}

}
  
window.toggleMenu=function(){
document.getElementById("sidebar").classList.toggle("open");
}

window.mostrarMenu=function(seccion){
mostrar(seccion);
document.getElementById("sidebar").classList.remove("open");
}

window.mostrar=function(p){

["nuevo","pedidos","produccion","ventas","dashboard"].forEach(id=>{
document.getElementById(id).classList.add("hidden");
});

document.getElementById(p).classList.remove("hidden");

if(p==="produccion"){
mostrarProduccion();
}

if(p==="ventas"){
mostrarHistorial();
}

}

window.cambiarVista=function(vista){

vistaActual=vista;

document.querySelectorAll(".tabsPedidos button").forEach(b=>b.classList.remove("activo"));

if(vista==="pendiente")document.getElementById("tabPendiente").classList.add("activo");
if(vista==="listo")document.getElementById("tabListo").classList.add("activo");
if(vista==="entregado")document.getElementById("tabEntregado").classList.add("activo");
if(vista==="pagado")document.getElementById("tabPagado").classList.add("activo");

mostrarPedidos();

}
window.seleccionarTipo=function(btn,tipo){

document.querySelectorAll(".btnTipo").forEach(b=>{
b.classList.remove("activo");
});

btn.classList.add("activo");

document.getElementById("tipo").value=tipo;

}
window.sumarPedido = function(tipo, btn){

let precio = parseInt(document.getElementById("precio").value);
let key = tipo + "_" + precio;

if(!pedidoTemp[key]){
pedidoTemp[key] = {
tipo: tipo,
precio: precio,
cantidad: 0
};
}

pedidoTemp[key].cantidad++;

btn.classList.add("activo");

mostrarResumen();

}
function mostrarResumen(){

let lista = "";
let total = 0;

for(let key in pedidoTemp){

let item = pedidoTemp[key];

let tipo = item.tipo;
let cantidad = item.cantidad;
let precioUnitario = item.precio;

let subtotal = cantidad * precioUnitario;
total += subtotal;

lista += `
<div style="
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:8px;
">

<div>
${tipo}
</div>

<div style="display:flex;align-items:center;gap:8px;">

<button onclick="restarPedido('${key}')" style="
background:#ff4d4d;
color:white;
border:none;
border-radius:6px;
padding:4px 8px;
">-</button>

<span>x${cantidad}</span>

<button onclick="sumarDesdeCarrito('${key}')" style="
background:#06C167;
color:white;
border:none;
border-radius:6px;
padding:4px 8px;
">+</button>

<span>$${subtotal}</span>

</div>

</div>
`;

}

/* 👇 ESTO SÍ VA DENTRO */
document.getElementById("listaPedido").innerHTML = lista;
document.getElementById("totalPedido").innerText = "Total: $" + total;

}
  
window.restarPedido = function(key){

if(pedidoTemp[key]){
pedidoTemp[key].cantidad--;

if(pedidoTemp[key].cantidad <= 0){
delete pedidoTemp[key];
}

mostrarResumen();
}

}
window.sumarDesdeCarrito = function(key){

if(pedidoTemp[key]){
pedidoTemp[key].cantidad++;
mostrarResumen();
}

}
window.agregarPedido=async function(){

let cliente=document.getElementById("cliente").value;
let fecha=document.getElementById("fechaPedido").value;
let precio=parseInt(document.getElementById("precio").value);

if(cliente===""){
alert("Escribe nombre");
return;
}

if(Object.keys(pedidoTemp).length===0){
alert("Selecciona tacos");
return;
}

let fechaObj=fecha?new Date(fecha+"T12:00:00"):new Date();

let tacos = (precio==35)?5:7;

/* 🔥 GUARDAR TODO */
for(let key in pedidoTemp){

let item = pedidoTemp[key];

for(let i=0;i<item.cantidad;i++){

await addDoc(pedidosRef,{
cliente,
tipo: item.tipo,
precio: item.precio,
tacos: item.precio == 35 ? 5 : 7,
fecha: Timestamp.fromDate(fechaObj),
estado:"pendiente"
});

}

}

/* 🧹 LIMPIAR TODO */
pedidoTemp = {};

document.getElementById("listaPedido").innerHTML="";
document.getElementById("totalPedido").innerText="";
document.getElementById("cliente").value="";
document.querySelectorAll(".btnTipo").forEach(b=>b.classList.remove("activo"));

alert("Pedido guardado 🚀");

}
function mostrarPedidos(){

let contenedor=document.getElementById("listaPedidos");
contenedor.innerHTML="";

let filtrados=pedidos.filter(p=>p.estado===vistaActual);

let porFecha={};

filtrados.forEach(p=>{

let fecha=p.fecha?.toDate().toISOString().split("T")[0];

if(!porFecha[fecha])porFecha[fecha]=[];

porFecha[fecha].push(p);

});

Object.keys(porFecha)
.sort((a,b)=>{

let da=new Date(a.split("/").reverse().join("-"));
let db=new Date(b.split("/").reverse().join("-"));

return db-da;

})
.forEach(fecha=>{

let card=document.createElement("div");
card.className="card";
let pedidosDia = porFecha[fecha];

let detalle=document.createElement("div");
detalle.style.display="none";

let boton=document.createElement("button");
boton.innerText="Ver";

boton.onclick=function(){

if(detalle.style.display==="none"){
detalle.style.display="block";
boton.innerText="Ocultar";
abiertos.add(fecha); // 👈 guardar abierto
}else{
detalle.style.display="none";
boton.innerText="Ver";
abiertos.delete(fecha); // 👈 quitar
}

}

let botonFinalizar="";

if(vistaActual==="pagado"){
botonFinalizar=`
<button onclick="finalizarPedidosFecha('${fecha}')" style="
background:#06C167;
color:white;
margin-bottom:10px;
">
Finalizar pedidos
</button>
`;
}

let fechaBonita = formatearFechaConDia(fecha);

card.innerHTML=`
<div class="cardTitulo">📅 ${fechaBonita}</div>
<div style="font-weight:bold;margin-bottom:10px;">
Órdenes totales: ${pedidosDia.length}
</div>
${botonFinalizar}
`;
pedidosDia.forEach(p=>{

let li=document.createElement("li");

if(p.estado==="pendiente")li.className="rojo";
if(p.estado==="listo")li.className="amarillo";
if(p.estado==="entregado")li.className="azul";
if(p.estado==="pagado")li.className="verde";

let botones="";

if(p.estado==="pendiente")
botones=`<button onclick="marcarListo('${p.id}')">✔</button>`;

if(p.estado==="listo")
botones=`<button onclick="entregar('${p.id}')">📦</button>`;

if(p.estado==="entregado")
botones=`<button onclick="pagar('${p.id}')">$</button>`;

botones+=` <button class="btnBorrar" onclick="borrarPedido('${p.id}')">X</button>`;

li.innerHTML=`
<div style="display:flex;flex-direction:column;width:100%;gap:4px;">

  <div style="font-size:18px;font-weight:bold;">
    👤 ${p.cliente}
  </div>

  <div style="font-size:16px;">
    🌮 ${p.tipo}
  </div>

  <div style="font-size:16px;">
    💲 $${p.precio} | 🫓 ${p.tacos || (p.precio==35?5:7)} tacos
  </div>

  <div style="margin-top:6px;">
    ${botones}
  </div>

</div>
`;

detalle.appendChild(li);

});

card.appendChild(boton);
card.appendChild(detalle);
 // 👇 restaurar estado abierto (AQUÍ SÍ FUNCIONA)
if(abiertos.has(fecha)){
detalle.style.display="block";
boton.innerText="Ocultar";
}
contenedor.appendChild(card);
});
}

/* FINALIZAR PEDIDOS */

  window.finalizarPedidosFecha=async function(fecha){

let pedidosDia=pedidos.filter(p=>{

let f=p.fecha?.toDate().toISOString().split("T")[0];

return f===fecha && p.estado==="pagado";

});

for(let p of pedidosDia){
await updateDoc(doc(db,"pedidos",p.id),{estado:"cerrado"});
}

alert("Pedidos del día enviados a ventas");

}

/* PRODUCCION */

function mostrarProduccion(){

let contenedor=document.getElementById("listaProduccion");
contenedor.innerHTML="";

/* SOLO PEDIDOS ACTIVOS */
let activos=pedidos.filter(p=>p.estado!=="cerrado");

/* AGRUPAR POR FECHA */
let porFecha={};

activos.forEach(p=>{
let fecha=p.fecha?.toDate().toLocaleDateString();
if(!porFecha[fecha]) porFecha[fecha]=[];
porFecha[fecha].push(p);
});

Object.keys(porFecha)
.sort((a,b)=>{
let da=new Date(a.split("/").reverse().join("-"));
let db=new Date(b.split("/").reverse().join("-"));
return db-da;
})
.forEach(fecha=>{

let card=document.createElement("div");
card.className="card";

let fechaBonita = formatearFechaConDia(fecha);

card.innerHTML=`<div class="cardTitulo">📅 ${fechaBonita}</div>`;

/* AGRUPAR POR TIPO */
let porTipo={};

porFecha[fecha].forEach(p=>{

let key=p.tipo;

if(!porTipo[key]){
porTipo[key]={
tipo:p.tipo,
ordenes:0,
tortillas:0
};
}

/* CONTAR ORDENES */
porTipo[key].ordenes++;

/* CALCULAR TORTILLAS (CORRECTO) */
let tacosCalculados = p.tacos;

if(!tacosCalculados){
if(p.precio == 35) tacosCalculados = 5;
if(p.precio == 50) tacosCalculados = 7;
}

porTipo[key].tortillas += tacosCalculados;

});

/* 🔥 YA FUERA DEL LOOP → AHORA SÍ CALCULAR */
let totalTortillas=0;

/* MOSTRAR TIPOS */
Object.values(porTipo).forEach(item=>{

let li=document.createElement("li");
li.style.background="white";
li.style.color="black";
li.style.display="block";
li.style.padding="10px";

let emoji="🌶";
if(item.tipo.includes("Tomate")) emoji="🍅";
if(item.tipo.includes("Papa")) emoji="🥔";
if(item.tipo.includes("Queso")) emoji="🧀";
if(item.tipo.includes("Pollo")) emoji="🍗";

li.innerHTML=`
<div style="font-weight:bold">${emoji} ${item.tipo}</div>
<div>${item.ordenes} órdenes | 🫓 ${item.tortillas}</div>
`;

totalTortillas+=item.tortillas;

card.appendChild(li);

});

/* TOTAL DEL DIA */
let total=document.createElement("div");

total.innerHTML = `
<div style="
font-size:20px;
font-weight:bold;
background:#06C167;
color:white;
padding:12px;
border-radius:10px;
text-align:center;
margin-top:10px;
">
🫓 TOTAL DEL DÍA: ${totalTortillas} tortillas
</div>
`;

card.appendChild(total);

contenedor.appendChild(card);

});

}
/* HISTORIAL */

function mostrarHistorial(){

let cont=document.getElementById("historialVentas");
cont.innerHTML="";

let ventas=pedidos.filter(p=>p.estado==="cerrado");

ventas.sort((a,b)=>b.fecha.seconds-a.fecha.seconds);

let agrupados={};

ventas.forEach(p=>{

let fecha=p.fecha?.toDate().toLocaleDateString();

if(!agrupados[fecha]) agrupados[fecha]=[];

agrupados[fecha].push(p);

});

Object.keys(agrupados)
.sort((a,b)=>{

let da=new Date(a.split("/").reverse().join("-"));
let db=new Date(b.split("/").reverse().join("-"));

return db-da;

})
.forEach(fecha=>{

let pedidosDia=agrupados[fecha];

let card=document.createElement("div");
card.className="card";

let tipos={};
let total=0;

pedidosDia.forEach(p=>{

let key=p.tipo+"-"+p.precio;

if(!tipos[key]){
tipos[key]={tipo:p.tipo,precio:p.precio,cantidad:0,id:p.id};
}

tipos[key].cantidad++;
total+=p.precio;

});

let detalle=document.createElement("div");
detalle.style.display="none";

for(let k in tipos){

let t=tipos[k];

let li=document.createElement("li");
li.className="verde";

li.innerHTML=`
${t.cantidad} ${t.tipo} = $${t.cantidad*t.precio}
<button class="btnBorrar" onclick="borrarPedido('${t.id}')">X</button>
`;

detalle.appendChild(li);

}

let boton=document.createElement("button");

boton.innerText="Abrir";

boton.onclick=function(){

if(detalle.style.display==="none"){
detalle.style.display="block";
boton.innerText="Cerrar";
}else{
detalle.style.display="none";
boton.innerText="Abrir";
}

}

let fechaBonita = formatearFechaConDia(fecha);

card.innerHTML=`
<div class="cardTitulo">Venta ${fechaBonita}</div>
<div style="font-weight:bold;margin-bottom:10px;">
💰 Total del día: $${total}
</div>
`;

card.appendChild(boton);
card.appendChild(detalle);

cont.appendChild(card);

});

}
/* DASHBOARD */

function actualizarDashboard(){

let ventas=pedidos.filter(p=>p.estado==="cerrado");

let porFecha={},porTipo={};

let totalVentas=0,totalOrdenes=0;

ventas.forEach(p=>{

let fechaObj=p.fecha.toDate();
let fecha=fechaObj.toLocaleDateString();

if(!porFecha[fecha]) porFecha[fecha]={total:0,ordenes:0,date:fechaObj};

porFecha[fecha].total+=p.precio;
porFecha[fecha].ordenes++;

if(!porTipo[p.tipo]) porTipo[p.tipo]=0;
porTipo[p.tipo]++;

totalVentas+=p.precio;
totalOrdenes++;

});

document.getElementById("kpiVentas").innerText="$"+totalVentas;
document.getElementById("kpiOrdenes").innerText=totalOrdenes;
document.getElementById("kpiPromedio").innerText="$"+(totalOrdenes?Math.round(totalVentas/totalOrdenes):0);

let ordenado=Object.values(porFecha).sort((a,b)=>a.date-b.date);

let labels=ordenado.map(f=>f.date.toLocaleDateString());
let ventasData=ordenado.map(f=>f.total);
let ordenesData=ordenado.map(f=>f.ordenes);

if(graficaVentas) graficaVentas.destroy();
if(graficaOrdenes) graficaOrdenes.destroy();
if(graficaTipos) graficaTipos.destroy();

graficaVentas=new Chart(document.getElementById("graficaVentasDia"),{
type:"bar",
data:{labels,datasets:[{label:"Ventas $",data:ventasData,backgroundColor:"#06C167"}]}
});

graficaOrdenes=new Chart(document.getElementById("graficaOrdenes"),{
type:"line",
data:{labels,datasets:[{label:"Órdenes",data:ordenesData,borderColor:"#f7b500",fill:false,tension:0.3}]}
});

graficaTipos=new Chart(document.getElementById("graficaTipos"),{
type:"pie",
data:{labels:Object.keys(porTipo),datasets:[{data:Object.values(porTipo),backgroundColor:["#06C167","#ff5a5f","#f7b500","#00aaff","#aa00ff","#ff9900"]}]}
});

}

snapshot.forEach(d=>pedidos.push({id:d.id,...d.data()}));
